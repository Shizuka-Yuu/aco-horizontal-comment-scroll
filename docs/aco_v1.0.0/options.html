<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Comment Overlay Settings</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        padding: 20px;
        margin: 0;
        background-color: #f5f5f7;
        color: #333;
        width: 320px;
      }
      h2 {
        font-size: 16px;
        margin-top: 20px;
        margin-bottom: 15px;
        border-bottom: 2px solid #007aff;
        padding-bottom: 6px;
      }
      h2:first-of-type {
        margin-top: 0;
      }
      .setting-group {
        margin-bottom: 15px;
      }
      .flex-row {
        display: flex;
        gap: 15px;
      }
      .flex-row > div {
        flex: 1;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 5px;
      }
      .input-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      input[type="range"] {
        flex-grow: 1;
        accent-color: #007aff;
      }
      input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        padding: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 12px;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: inherit;
        font-size: 11px;
        resize: vertical;
      }
      .val-display {
        font-size: 11px;
        color: #666;
        min-width: 45px;
        text-align: right;
      }
      #status {
        font-size: 12px;
        color: #4cd964;
        height: 15px;
        margin-top: 10px;
        font-weight: bold;
      }
      .note {
        font-size: 11px;
        color: #888;
        margin-top: 20px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h2>表示設定</h2>

    <div class="setting-group">
      <label for="duration">流れる速度（表示時間）</label>
      <div class="input-wrapper">
        <input type="range" id="duration" min="2000" max="15000" step="500" />
        <span class="val-display" id="durationVal">7000ms</span>
      </div>
    </div>

    <div class="setting-group">
      <label for="fontSize">フォントサイズ</label>
      <div class="input-wrapper">
        <input type="range" id="fontSize" min="16" max="40" step="1" />
        <span class="val-display" id="fontSizeVal">24px</span>
      </div>
    </div>

    <div class="setting-group">
      <label for="laneCount">最大レーン（行）数</label>
      <div class="input-wrapper">
        <input type="number" id="laneCount" min="5" max="30" step="1" />
      </div>
    </div>

    <div class="setting-group">
      <label for="opacity">不透明度</label>
      <div class="input-wrapper">
        <input type="range" id="opacity" min="0.1" max="1.0" step="0.1" />
        <span class="val-display" id="opacityVal">1.0</span>
      </div>
    </div>

    <div class="setting-group">
      <label for="systemColor">システムメッセージの色</label>
      <div class="input-wrapper">
        <input type="color" id="systemColor" value="#888888" />
        <span class="val-display" id="systemColorVal">#888888</span>
      </div>
    </div>

    <h2>フィルター設定 (NG機能)</h2>

    <div class="setting-group">
      <label for="ngWords">NGワード (改行区切り)</label>
      <textarea
        id="ngWords"
        rows="3"
        placeholder="非表示にしたいワードを入力"
      ></textarea>
    </div>

    <div class="setting-group">
      <label for="ngRegex">NG正規表現 (改行区切り)</label>
      <textarea
        id="ngRegex"
        rows="3"
        placeholder="例: ^[a-zA-Z0-9]+$ (半角英数字のみ非表示)"
      ></textarea>
    </div>

    <div class="setting-group flex-row">
      <div>
        <label for="ngMinLength">最小文字数</label>
        <input type="number" id="ngMinLength" min="0" max="100" step="1" />
      </div>
      <div>
        <label for="ngMaxLength">最大文字数 (0で無効)</label>
        <input type="number" id="ngMaxLength" min="0" max="500" step="1" />
      </div>
    </div>

    <div id="status"></div>

    <hr />

    <div class="note">
      <p>※設定変更後、現在開いている配信ページを一度リロードしてください。</p>
      <p>※迷惑なコメントがある場合</p>
      <p>
        <a
          href="https://help.abema.tv/hc/ja/articles/360013741251-%E8%BF%B7%E6%83%91%E3%81%AA%E3%82%B3%E3%83%A1%E3%83%B3%E3%83%88%E3%81%8C%E3%81%82%E3%82%8B%E5%A0%B4%E5%90%88"
          target="_blank"
          title="迷惑なコメントがある場合のヘルプページ"
          >https://help.abema.tv/hc/ja/articles/360013741251-迷惑なコメントがある場合</a
        >
      </p>
    </div>

    <script src="options.js"></script>
  </body>
</html>
